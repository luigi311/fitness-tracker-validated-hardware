name: New Device Submission
description: Suggest a new device to be added to the supported devices list.
title: "[Device] <manufacturer> <model>"
labels: ["new-device", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping grow the catalog! Fill in the fields below and a maintainer
        will turn it into a TOML file.

        Prefer doing it yourself? See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for
        the pull-request workflow.

  - type: input
    id: name
    attributes:
      label: Device name
      placeholder: "Polar H10"
    validations:
      required: true

  - type: input
    id: manufacturer
    attributes:
      label: Manufacturer
      placeholder: "Polar"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - heart-rate
        - footpods
        - cycling-trainers
        - cycling-sensors
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: Support status
      description: How well does it work with the app right now?
      options:
        - fully-supported
        - partial
        - experimental
        - unsupported
    validations:
      required: true

  - type: checkboxes
    id: connectivity
    attributes:
      label: Connectivity
      options:
        - label: BLE (Bluetooth Low Energy)
    validations:
      required: true

  - type: input
    id: verified_version
    attributes:
      label: App version tested
      placeholder: "3.0.0"
    validations:
      required: true

  - type: input
    id: verified_date
    attributes:
      label: Date verified (YYYY-MM-DD)
      placeholder: "2026-04-17"
    validations:
      required: true

  - type: input
    id: features
    attributes:
      label: Features confirmed working
      description: Comma-separated. e.g. heart-rate
      placeholder: "heart-rate"

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Anything useful for other users — quirks, workarounds, partial-support details.

  - type: input
    id: manufacturer_url
    attributes:
      label: Product page URL or manufacturer website
      placeholder: "hhttps://www.polar.com/en/sensors/h10-heart-rate-sensor"

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I have personally tested this device with the app and recorded at least one full session.
          required: true
