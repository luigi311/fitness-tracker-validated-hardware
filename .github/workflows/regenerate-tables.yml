name: Regenerate Device Tables

on:
  push:
    branches: [main]
    paths:
      - "devices/**/*.md"
  pull_request:
    types: [labeled]
  workflow_dispatch:

jobs:
  regenerate:
    # Run on push to main, manual trigger, or when 'regenerate-tables' label is added to a PR
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'regenerate-tables')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use the PR head ref when triggered by a PR label event
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run generate-tables.py
        run: python scripts/generate-tables.py

      - name: Commit updated READMEs (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add devices/**/README.md
          git diff --cached --quiet || (
            git commit -m "chore: regenerate device tables [skip ci]" &&
            git push
          )
