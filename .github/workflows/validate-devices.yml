name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install Python deps
        run: uv sync --frozen --no-dev

      - name: Validate device files
        run: uv run scripts/validate_devices.py

      - name: Smoke-test manifest build
        run: uv run scripts/build_manifest.py

      - name: Install zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.19.2

      - name: Smoke-test site build
        run: zola build
