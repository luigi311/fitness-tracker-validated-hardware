# The URL the site will be built for
base_url = "https://fitness-tracker.luigi311.com"

title = "Fitness Tracker — Supported Devices"
description = "Community-maintained list of devices supported by the Linux fitness tracker app"

# Default language
default_language = "en"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

# Generate a feed
generate_feeds = true
feed_filenames = ["atom.xml"]

[markdown]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
highlight_code = true
highlight_theme = "base16-ocean-dark"

[extra]
# Put all your custom variables here
# Repo URL — used for "Edit on GitHub" links and contribution prompts
repo_url = "https://github.com/luigi311/fitness-tracker-validated-hardware"
# App name
app_name = "Fitness Tracker"

# Enable rybbit anayltics tracking
head_extra = '''
<script
  defer
  src="https://analytics.luigi311.com/api/script.js"
  data-site-id="3"
  data-track-errors="true"
></script>
'''