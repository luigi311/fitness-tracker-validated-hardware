<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
  <link rel="stylesheet" href="{{ get_url(path='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="site-title" href="{{ get_url(path='/') }}">{{ config.extra.app_name }} Devices</a>
      <nav>
        <a href="{{ get_url(path='/') }}">Home</a>
        <a href="{{ get_url(path='/devices/') }}">Devices</a>
        <a href="{{ get_url(path='/docs/contributing/') }}">Contribute</a>
        <a href="{{ config.extra.repo_url }}" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        Community-maintained.
        <a href="{{ config.extra.repo_url }}">Source on GitHub</a>
      </p>
    </div>
  </footer>
</body>
</html>
